services:
  postgres:
    image: postgres:16
    container_name: zoeskoul-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: zoeskoul-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  runner:
    build:
      context: ..
      dockerfile: apps/runner/Dockerfile
    container_name: zoeskoul-runner
    environment:
      NODE_ENV: production
      PORT: ${RUNNER_PORT}
      RUNNER_IMAGE: zoeskoul-runtime:latest
      DOCKER_SOCKET: /var/run/docker.sock
      RUN_WALL_TIMEOUT_MS: ${RUN_WALL_TIMEOUT_MS}
      RUN_IDLE_TIMEOUT_MS: ${RUN_IDLE_TIMEOUT_MS}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "${RUNNER_PORT}:4001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-tmp:/tmp
    depends_on:
      - redis
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: zoeskoul-web
    environment:
      NODE_ENV: production
      RUNNER_BASE_URL: ${RUNNER_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
    ports:
      - "${WEB_PORT}:3000"
    depends_on:
      - postgres
      - redis
      - runner
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  runner-tmp:


networks:
  public:
    external: true