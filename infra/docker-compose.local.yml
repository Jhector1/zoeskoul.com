services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:?required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  runtime-image:
    image: zoeskoul-runtime:latest
    build:
      context: ..
      dockerfile: apps/runtime/Dockerfile
    profiles:
      - build-only

  runner:
    image: zoeskoul-runner:latest
    build:
      context: ..
      dockerfile: apps/runner/Dockerfile
    user: "0:0"
    environment:
      NODE_ENV: production
      PORT: 4001
      DOCKER_SOCKET: /var/run/docker.sock
      RUNNER_IMAGE: ${RUNNER_IMAGE:-zoeskoul-runtime:latest}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:?required}
      PTY_ATTACH_SECRET: ${PTY_ATTACH_SECRET:?required}
      REDIS_URL: redis://redis:6379
      RUNNER_WORKSPACE_ROOT: ${RUNNER_WORKSPACE_ROOT:?required}
      RUN_WALL_TIMEOUT_MS: ${RUN_WALL_TIMEOUT_MS:-15000}
      RUN_IDLE_TIMEOUT_MS: ${RUN_IDLE_TIMEOUT_MS:-20000}
      RUNNER_EXEC_UID: ${RUNNER_EXEC_UID:-1000}
      RUNNER_EXEC_GID: ${RUNNER_EXEC_GID:-1000}
      RUNNER_MAX_FILES: ${RUNNER_MAX_FILES:-32}
      RUNNER_MAX_TOTAL_BYTES: ${RUNNER_MAX_TOTAL_BYTES:-262144}
      RUNNER_MAX_CONCURRENT_PER_ACTOR: ${RUNNER_MAX_CONCURRENT_PER_ACTOR:-3}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:4001:4001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${RUNNER_WORKSPACE_ROOT:?required}:${RUNNER_WORKSPACE_ROOT:?required}:rw
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /run:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    restart: unless-stopped

volumes:
  postgres-data: