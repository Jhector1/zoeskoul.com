name: Build production images

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      build_web:
        description: "Also build and push the web Docker image"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: owner
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Web image is kept for later, but skipped on normal pushes.
      # Vercel builds apps/web now, so this should not block runner deployment.
      - name: Build and push web image
        if: github.event_name == 'workflow_dispatch' && inputs.build_web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/zoeskoul-web:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/zoeskoul-web:prod

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/zoeskoul-runner:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/zoeskoul-runner:prod

      - name: Build and push runner runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runner/runtime/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/zoeskoul-runtime:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/zoeskoul-runtime:prod