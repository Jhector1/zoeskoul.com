services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:?required}
      DOMAIN: ${DOMAIN:?required}
      RUNNER_DOMAIN: ${RUNNER_DOMAIN:?required}
      RUNNER_PRIVATE_URL: ${RUNNER_PRIVATE_URL:?required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - webnet
    logging: &default_logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web:
    image: ghcr.io/${GHCR_OWNER:?required}/zoeskoul-web:${IMAGE_TAG:-prod}
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - webnet
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    pids_limit: 768
    mem_limit: ${WEB_MEM_LIMIT:-1536m}
    cpus: ${WEB_CPUS:-1.5}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http'); const req=http.get('http://127.0.0.1:3000/',res=>process.exit(res.statusCode<500?0:1)); req.on('error',()=>process.exit(1)); req.setTimeout(5000,()=>{req.destroy();process.exit(1)});\""]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 45s

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?required}
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - webnet
    logging: *default_logging
    security_opt:
      - no-new-privileges:true

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?required}
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--requirepass", "${REDIS_PASSWORD:?required}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - webnet
    logging: *default_logging
    security_opt:
      - no-new-privileges:true

networks:
  webnet:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
