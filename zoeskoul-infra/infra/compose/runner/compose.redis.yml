services:
  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    container_name: zoeskoul-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--protected-mode", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

volumes:
  redis-data:

networks:
  backend:
    name: ${BACKEND_NETWORK:-zoeskoul-backend}
    external: true
